<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Dashboard - Dynamic Content Issues</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #1a202c;
            color: #e2e8f0;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .status-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .status-item {
            background: #2d3748;
            padding: 15px 20px;
            border-radius: 8px;
            flex: 1;
        }
        /* VIOLATION: Content updates without aria-live */
        .live-updates {
            background: #2d3748;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            min-height: 200px;
        }
        .notification {
            background: #4299e1;
            color: white;
            padding: 12px 20px;
            margin: 10px 0;
            border-radius: 4px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .chart-container {
            background: #2d3748;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #a0aec0;
        }
        .error-message {
            background: #fc8181;
            color: #742a2a;
            padding: 15px;
            border-radius: 4px;
            margin: 10px 0;
        }
        button {
            background-color: #4299e1;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background-color: #3182ce;
        }
        .search-results {
            background: #2d3748;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .result-item {
            padding: 10px;
            border-bottom: 1px solid #4a5568;
        }
        .spinner {
            border: 4px solid #4a5568;
            border-top: 4px solid #4299e1;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>System Monitor Dashboard</h1>
            <div>
                <!-- VIOLATION 1: Time updates without aria-live -->
                <span id="current-time">Loading...</span>
            </div>
        </div>
        
        <!-- VIOLATION 2: Status updates without aria-live regions -->
        <div class="status-bar">
            <div class="status-item">
                <h3>CPU Usage</h3>
                <div id="cpu-usage">--</div>
            </div>
            <div class="status-item">
                <h3>Memory</h3>
                <div id="memory-usage">--</div>
            </div>
            <div class="status-item">
                <h3>Network</h3>
                <div id="network-status">--</div>
            </div>
            <div class="status-item">
                <h3>Active Users</h3>
                <div id="active-users">--</div>
            </div>
        </div>
        
        <!-- VIOLATION 3: Live notification feed without aria-live -->
        <div class="live-updates">
            <h2>System Notifications</h2>
            <div id="notifications-container">
                <p>Waiting for notifications...</p>
            </div>
        </div>
        
        <!-- VIOLATION 4: Dynamic chart loading without status announcement -->
        <div class="chart-container">
            <h2>Performance Metrics</h2>
            <button onclick="loadChartData()">Load Chart Data</button>
            <div id="chart-area">
                <p>Click button to load chart</p>
            </div>
        </div>
        
        <!-- VIOLATION 5: Search with AJAX results without aria-live -->
        <div class="search-results">
            <h2>Log Search</h2>
            <input type="text" 
                   id="search-input" 
                   placeholder="Search logs..." 
                   onkeyup="performSearch()"
                   style="width: 100%; padding: 10px; margin-bottom: 15px; background: #1a202c; color: white; border: 1px solid #4a5568; border-radius: 4px;">
            <div id="search-results-area">
                <p>Enter search term to begin</p>
            </div>
        </div>
        
        <!-- VIOLATION 6: Error messages appearing dynamically without announcement -->
        <div id="error-container"></div>
        
        <!-- VIOLATION 7: Progress indicator without status updates -->
        <div class="chart-container">
            <h2>Data Synchronization</h2>
            <button onclick="startSync()">Start Sync</button>
            <div id="sync-progress"></div>
        </div>
    </div>
    
    <script>
        // VIOLATION 8: Auto-updating time without aria-live
        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').textContent = 
                now.toLocaleTimeString();
        }
        setInterval(updateTime, 1000);
        updateTime();
        
        // VIOLATION 9: Status updates without announcements
        function updateStats() {
            document.getElementById('cpu-usage').textContent = 
                Math.floor(Math.random() * 100) + '%';
            document.getElementById('memory-usage').textContent = 
                Math.floor(Math.random() * 16) + 'GB / 16GB';
            document.getElementById('network-status').textContent = 
                Math.floor(Math.random() * 1000) + ' Mbps';
            document.getElementById('active-users').textContent = 
                Math.floor(Math.random() * 500) + ' users';
        }
        setInterval(updateStats, 3000);
        updateStats();
        
        // VIOLATION 10: Adding notifications without aria-live
        let notificationCount = 0;
        function addNotification() {
            const messages = [
                'Database backup completed successfully',
                'Warning: High memory usage detected',
                'New user registered: user' + Math.floor(Math.random() * 1000),
                'System update available',
                'Server response time: ' + Math.floor(Math.random() * 500) + 'ms'
            ];
            
            const container = document.getElementById('notifications-container');
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = messages[Math.floor(Math.random() * messages.length)];
            
            container.insertBefore(notification, container.firstChild);
            
            if (container.children.length > 5) {
                container.removeChild(container.lastChild);
            }
        }
        setInterval(addNotification, 5000);
        
        // VIOLATION 11: Loading states without announcements
        function loadChartData() {
            const chartArea = document.getElementById('chart-area');
            chartArea.innerHTML = '<div class="spinner"></div><p>Loading chart data...</p>';
            
            setTimeout(() => {
                chartArea.innerHTML = '<p style="color: #48bb78;">✓ Chart loaded successfully with 234 data points</p>';
            }, 2000);
        }
        
        // VIOLATION 12: Search results without aria-live
        let searchTimeout;
        function performSearch() {
            clearTimeout(searchTimeout);
            const query = document.getElementById('search-input').value;
            
            if (!query) {
                document.getElementById('search-results-area').innerHTML = 
                    '<p>Enter search term to begin</p>';
                return;
            }
            
            document.getElementById('search-results-area').innerHTML = 
                '<div class="spinner"></div>';
            
            searchTimeout = setTimeout(() => {
                const results = Math.floor(Math.random() * 20);
                let html = `<p>Found ${results} results for "${query}":</p>`;
                
                for (let i = 0; i < Math.min(results, 5); i++) {
                    html += `<div class="result-item">Log entry ${i + 1}: Sample log message for ${query}</div>`;
                }
                
                document.getElementById('search-results-area').innerHTML = html;
            }, 800);
        }
        
        // VIOLATION: Error messages without proper announcement
        function showError() {
            const errorContainer = document.getElementById('error-container');
            const error = document.createElement('div');
            error.className = 'error-message';
            error.textContent = 'Connection to server lost. Retrying...';
            errorContainer.appendChild(error);
            
            setTimeout(() => error.remove(), 5000);
        }
        
        if (Math.random() > 0.7) {
            setTimeout(showError, 10000);
        }
        
        // VIOLATION: Progress updates without announcements
        function startSync() {
            const progressArea = document.getElementById('sync-progress');
            let progress = 0;
            
            const interval = setInterval(() => {
                progress += 10;
                progressArea.innerHTML = `<p>Syncing: ${progress}%</p><div style="background: #4a5568; height: 20px; border-radius: 4px; overflow: hidden;"><div style="background: #4299e1; height: 100%; width: ${progress}%;"></div></div>`;
                
                if (progress >= 100) {
                    clearInterval(interval);
                    progressArea.innerHTML = '<p style="color: #48bb78;">Sync completed!</p>';
                }
            }, 500);
        }
    </script>
</body>
</html>
